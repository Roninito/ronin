name: Electrobun Packaging

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-client:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop/electrobun
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build client package
        run: bun run dist:${{ matrix.platform }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electrobun-${{ matrix.platform }}
          path: desktop/electrobun/dist/**
          if-no-files-found: error
